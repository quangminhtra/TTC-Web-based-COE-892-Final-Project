services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../backend:/app
    ports:
      - "8000:8000"

  worker:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "pip install -r requirements.txt && python -m app.main"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ../worker:/app
