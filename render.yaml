services:
  - type: web
    name: ttc-transit-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: APP_NAME
        value: TTC Transit API
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: DATABASE_URL
        sync: false
